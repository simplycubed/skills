# Provision the Cloudflare infra for the snapshot store, as code (IaC).
# Creates the R2 bucket and deploys the CDN Worker (which also creates the
# cdn.simplycubed.com DNS record + route). Idempotent + safe to re-run.
#
# Manual only (workflow_dispatch) so it never runs before the token exists.
# Runs under the `prod` GitHub Environment, which holds the single skills-scoped
# CLOUDFLARE_API_TOKEN (Workers R2:Edit + Workers Scripts:Edit + zone DNS/Routes).
name: Provision Cloudflare (R2 bucket + CDN Worker)

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    environment: prod
    env:
      WRANGLER_VERSION: "4" # TODO: pin to an exact version once confirmed
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      R2_BUCKET: simplycubed-skills
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - run: npm install -g "wrangler@${WRANGLER_VERSION}"

      - name: Create the R2 bucket (idempotent)
        run: node scripts/r2-bootstrap.mjs

      - name: Deploy the CDN Worker (creates cdn.simplycubed.com DNS + route)
        working-directory: workers/cdn
        run: wrangler deploy

      - name: Smoke — the live CDN returns 404 for a missing object
        run: |
          hex=$(printf '%064d' 0)
          code=$(curl -s -o /dev/null -w '%{http_code}' "https://cdn.simplycubed.com/blobs/sha256/${hex}/unit.tar.gz")
          echo "CDN 404 probe: $code"
          [ "$code" = "404" ] || { echo "✗ expected 404 from the live CDN Worker"; exit 1; }
          echo "✓ cdn.simplycubed.com is live"
