# Skills miner — top-of-funnel SOURCE DISCOVERY (DRY RUN ONLY).
#
# Runs discover → phase1 (funnel-report.mjs) to surface candidate Agent Skills
# from public GitHub, then uploads the new-candidate list as an artifact. It does
# NOT judge, ingest, merge, deploy, or mutate anything — pure read-only discovery.
#
# ─────────────────────────────────────────────────────────────────────────────
# DISARMED ON PURPOSE. The `schedule:` trigger below is COMMENTED OUT so nothing
# fires automatically against the public marketplace. Intended cadence once armed:
#   0 1 * * 1-5   → 01:00 UTC / 10:00 JST, weekday mornings (daily Mon–Fri).
# To arm: (1) uncomment the schedule, (2) confirm code search works under the
# workflow token — the default GITHUB_TOKEN is installation-scoped and may NOT be
# permitted to run `gh search code`; arming likely needs a user-scoped PAT in a
# repo secret (e.g. MINER_GH_TOKEN). This is a Charles decision (see the checklist
# in the PR that added this file). NO auto-merge is wired here or intended for the
# dry run.
# ─────────────────────────────────────────────────────────────────────────────
name: Skills miner (dry run)

on:
  # schedule:
  #   - cron: "0 1 * * 1-5" # 01:00 UTC / 10:00 JST, weekday mornings — DISARMED (uncomment to arm)
  workflow_dispatch: {} # manual "run the funnel" button — the only live trigger

# Read-only. Discovery reads public GitHub; it never writes to this repo.
permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    env:
      # gh needs a token to run searches. github.token works for many gh calls,
      # but code search may require a user PAT — see the arming note above.
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - name: Run the discovery funnel (discover → phase1, dry run — no judge, no ingest)
        run: pnpm funnel --out candidates.json

      - name: Upload candidate list
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: skill-candidates
          path: candidates.json
          if-no-files-found: warn
