name: CI

on:
  pull_request:
  push:
    branches: [main]

# The gate runs on untrusted config in PRs; give it read-only, no secrets.
permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned by commit SHA (never a mutable tag). v5 line runs on Node 24.
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          # v5 defaults package-manager-cache: true, which runs pnpm to prime a
          # cache before `corepack enable` puts pnpm on PATH. We don't use that
          # cache (frozen install is fast), so disable it to avoid the ordering fail.
          package-manager-cache: false
      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - name: Workflow YAML lint (every .github/workflows/*.yml parses)
        run: pnpm workflow:lint

      - name: Validate skill configs (schema + permissive-license allowlist + slug==filename)
        run: pnpm validate

      - name: Certification gate self-test (clean passes, dirty blocked, review-only passes)
        run: pnpm gate:selftest

      - name: Unit self-test (license assembly, fail-closed scanner, validator, structure guards)
        run: pnpm unit:selftest

      - name: R2 transport self-test (pack/unpack is contentHash-lossless)
        run: pnpm r2:selftest

      - name: Manifest generator self-test (source shapes + install strings)
        run: pnpm generate:selftest

      - name: No-drift (committed marketplace.json + catalog.json match config)
        run: pnpm generate:check

      - name: Catalog contract (catalog.json matches config/catalog.schema.json)
        run: pnpm catalog:check

      - name: "Snapshot seam self-test (materializeUnit local source + fail-closed on drift)"
        run: pnpm snapshot:selftest

      - name: Snapshot integrity (every active skill verifies from R2/local vs its manifest)
        run: pnpm snapshot:check

      - name: "Version gate self-test (upstream-semver classify + SKILL.md frontmatter parse)"
        run: pnpm versions:selftest

      - name: Versions (every listing version is upstream-sourced strict semver or unversioned)
        run: pnpm versions:check

      - name: Anti-bloat guard (no snapshot unit bytes tracked in git — they live in R2)
        run: pnpm bloat:guard

      - name: Revocation self-test (revoked skills drop from both manifests; snapshot removed)
        run: pnpm revoke:selftest

  # Per-skill certification: re-scan each active skill's committed SNAPSHOT (no
  # upstream fetch) with the full scanner suite. Separate from `gate` because it
  # needs the external scanner binaries and the OSV database — and because running
  # these scanners over THIS repo's own tooling would false-positive on the
  # injection patterns certify.mjs contains. No secrets, read-only: a committed
  # scan.json is only a display copy; merge requires this live re-scan to pass.
  certify:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.18.4"
      OSV_VERSION: "2.4.0"
      SEMGREP_VERSION: "1.168.0"
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - name: Install pinned scanners (gitleaks + osv-scanner + semgrep)
        run: |
          mkdir -p "$HOME/.bin"
          curl -sSLf "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C "$HOME/.bin" gitleaks
          curl -sSLf "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64" -o "$HOME/.bin/osv-scanner"
          chmod +x "$HOME/.bin/gitleaks" "$HOME/.bin/osv-scanner"
          echo "$HOME/.bin" >> "$GITHUB_PATH"
          # semgrep (pip-installed, pinned); ~/.local/bin holds the entrypoint.
          python3 -m pip install --user --quiet "semgrep==${SEMGREP_VERSION}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Scanner self-test (gitleaks + osv-scanner fire on dirty, clear on clean)
        run: pnpm scan:selftest

      - name: Re-verify every active skill from its committed snapshot (no upstream fetch)
        run: pnpm certify:active
